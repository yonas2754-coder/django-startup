<!-- templates/registration/register.html -->
{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 30px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>📝 Create Account</h2>
    
    <form method="post">  <!-- 👈 MUST be method="post" -->
        {% csrf_token %}  <!-- 👈 CRITICAL: Must be INSIDE the form -->
        {{ form.as_p }}
        <button type="submit" style="background:#007bff; color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer;">
            Register
        </button>
    </form>
    
    <p style="margin-top: 15px;">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</div>
{% endblock %}
